<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexiones - Juego</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Conexiones</h1>
        <p class="subtitle">Encuentra las 4 categorías conectadas</p>

        <div class="info-bar">
            <span>Intentos: <span id="tries">4</span></span>
            <div style="display:flex; gap:8px; align-items:center;">
                <button id="puzzleBtn" style="padding:6px 10px; border-radius:6px; border:1px solid #ccc; background:#fff;">otros días</button>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn-accept" id="acceptBtn">Aceptar</button>
            <button class="btn-reset" id="resetBtn">Reiniciar</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <!-- Puzzle data -->
    <script src="data/puzzles.js"></script>

    <!-- App scripts: order matters, each builds on the previous one -->
    <script src="js/state.js"></script>
    <script src="js/puzzle-loader.js"></script>
    <script src="js/render.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
