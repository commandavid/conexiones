<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexiones - Juego</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        // Apply the saved (or system) appearance before first paint to avoid
        // a flash of the wrong theme.
        (function () {
            try {
                var allowed = ['clasico', 'minimalista', 'oceano', 'atardecer', 'bosque', 'uva'];
                var t = localStorage.getItem('conexiones-theme');
                if (allowed.indexOf(t) === -1) t = 'clasico';
                var m = localStorage.getItem('conexiones-mode');
                if (m !== 'dark' && m !== 'light') {
                    m = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', t);
                document.documentElement.setAttribute('data-mode', m);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <button class="appearance-btn" id="themeBtn" title="Temas" aria-label="Cambiar tema">🎨</button>
            <h1>Conexiones</h1>
            <label class="mode-toggle" title="Modo claro / oscuro">
                <input type="checkbox" id="modeToggle" aria-label="Activar modo oscuro">
                <span class="mode-slider"></span>
            </label>
            <div class="theme-menu" id="themeMenu" hidden></div>
        </div>
        <p class="subtitle">Encuentra las 4 categorías conectadas</p>

        <div class="info-bar">
            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">Intentos:</span>
                    <span class="stat-value" id="tries">4</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Reinicios:</span>
                    <span class="stat-value" id="resets">0</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-icon" id="subscribeBtn" title="Avísame de nuevos puzzles">⭐</button>
                <button class="btn-icon" id="rulesBtn" title="Cómo jugar">❓</button>
                <button class="btn-icon" id="leaderboardBtn" title="Leaderboard">🏆</button>
                <button class="btn-icon" id="puzzleBtn" title="Otros días">📅</button>
            </div>
        </div>

        <p class="puzzle-title" id="puzzleTitle"></p>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn-accept" id="acceptBtn">Aceptar</button>
            <button class="btn-reset" id="resetBtn">Reiniciar</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Tu configuración de Firebase - REEMPLAZA CON TUS DATOS

            authDomain: "conexiones-game.firebaseapp.com",
            projectId: "conexiones-game",
            storageBucket: "conexiones-game.firebasestorage.app",
            messagingSenderId: "491600988468",

            //measurementId: "G-9QV8JZWYNK"

        firebase.initializeApp(firebaseConfig);

        db.settings({ timestampsInSnapshots: true });

    <!-- Puzzle data -->
    <script src="data/puzzles.js"></script>

    <!-- App scripts -->

    <script src="js/puzzle-loader.js"></script>
    <script src="js/render.js"></script>
    <script src="js/game.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/theme.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
